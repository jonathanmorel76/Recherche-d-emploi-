<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#060d1a"/>
<link rel="manifest" href="./manifest.json"/>
<meta name="description" content="Veille emploi transport, mobilité et cartographie"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="TransitJobs"/>
<title>TransitJobs — Veille emploi mobilité</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060d1a;--bg2:#0d1526;--bg3:#0a1120;
  --border:#1e3a5f;--border2:#334155;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--text4:#475569;
  --accent:#0ea5e9;--accent2:#0284c7;
  --green:#4ade80;--amber:#f59e0b;--purple:#a78bfa;--orange:#fb923c;
}
html,body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:8px 10px;outline:none;transition:border-color .2s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
button{cursor:pointer;font-family:'Sora',sans-serif}
a{color:var(--accent);text-decoration:none}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh}
header{background:linear-gradient(180deg,#020913,var(--bg));border-bottom:1px solid rgba(14,165,233,.15);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-name{font-size:15px;font-weight:800;letter-spacing:-.3px}
.logo-name span{color:var(--accent)}
.logo-sub{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:2px;margin-top:1px}
.header-tabs{display:flex;gap:6px}
.tab-btn{background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 12px;transition:all .15s}
.tab-btn.active{background:rgba(14,165,233,.12);border-color:var(--accent);color:var(--accent)}

main{display:flex;gap:20px;max-width:1200px;margin:0 auto;padding:20px;align-items:flex-start;width:100%}

/* Sidebar */
aside{width:280px;flex-shrink:0;position:sticky;top:70px;display:flex;flex-direction:column;gap:12px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px}
.panel-title{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.field-group{margin-bottom:12px}
.field-label{display:block;font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Tags */
.tag{display:inline-flex;align-items:center;gap:3px;border-radius:4px;padding:2px 7px;font-size:11px;font-family:'JetBrains Mono',monospace;border:1px solid}
.tag-remove{background:none;border:none;line-height:1;font-size:13px;cursor:pointer;padding:0;opacity:.7}
.tags-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.kw-row{display:flex;gap:6px}

/* Contract buttons */
.ct-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.ct-btn{background:transparent;border:1px solid var(--border2);border-radius:4px;color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 9px;transition:all .15s}

/* Search button */
.search-btn{width:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border:none;border-radius:7px;color:#fff;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;letter-spacing:1px;padding:12px;margin-top:4px;transition:opacity .2s}
.search-btn:disabled{opacity:.5;cursor:not-allowed}
.export-btn{width:100%;background:transparent;border:1px solid #166534;border-radius:7px;color:#4ade80;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:1px;padding:10px;transition:all .2s}
.export-btn:hover{background:rgba(74,222,128,.08)}
.export-btn:disabled{opacity:.4;cursor:not-allowed}
.add-manual-btn{width:100%;background:transparent;border:1px dashed var(--border2);border-radius:7px;color:var(--text4);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px;transition:all .15s}
.add-manual-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Install banner */
#install-banner{display:none;background:linear-gradient(90deg,#0f2233,#0d1a2e);border:1px solid rgba(14,165,233,.3);border-radius:8px;padding:12px 14px;align-items:center;justify-content:space-between;gap:10px}
#install-banner.show{display:flex}
#install-banner p{font-size:12px;color:var(--text2)}
#install-btn{background:var(--accent2);border:none;border-radius:5px;color:#fff;font-size:12px;font-family:'JetBrains Mono',monospace;padding:6px 12px;white-space:nowrap}
#install-close{background:none;border:none;color:var(--text3);font-size:18px;padding:0}

/* Content */
.content{flex:1;min-width:0}
.status-bar{border-radius:6px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.status-ok{background:#0a1a0a;border:1px solid #14532d;color:var(--green)}
.status-err{background:#1a0a0a;border:1px solid #7f1d1d;color:#f87171}
.status-info{background:#0a1320;border:1px solid var(--border);color:var(--text2)}

/* Empty state */
.empty{text-align:center;padding:60px 20px;border:1px dashed var(--border);border-radius:10px}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty p{color:var(--text4);font-size:13px;font-family:'JetBrains Mono',monospace;line-height:1.7}

/* Offers grid */
.offers-grid{display:grid;grid-template-columns:1fr;gap:11px}
.offers-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.offers-count{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.clear-btn{background:none;border:none;color:var(--text4);font-size:11px;font-family:'JetBrains Mono',monospace}

/* Job card */
.card{background:linear-gradient(135deg,var(--bg),#0d1526);border:1px solid var(--border);border-radius:8px;padding:15px 17px;transition:transform .15s,border-color .2s;animation:fadeIn .3s ease both}
.card:hover{transform:translateY(-1px)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:9px}
.card-title{font-size:14px;font-weight:700;line-height:1.3;color:var(--text)}
.card-company{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.star-btn{background:none;border:none;font-size:19px;line-height:1;transition:filter .2s;flex-shrink:0}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.card-desc{font-size:12px;color:var(--text2);line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical}
.expand-btn{background:none;border:none;color:var(--accent);font-size:11px;font-family:'JetBrains Mono',monospace;padding:3px 0 0;cursor:pointer}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:11px}
.card-source{font-size:10px;color:var(--text4);font-family:'JetBrains Mono',monospace}
.offer-link{font-size:11px;color:var(--accent);background:rgba(14,165,233,.08);border:1px solid rgba(14,165,233,.2);border-radius:4px;padding:3px 9px;font-family:'JetBrains Mono',monospace;transition:background .15s}
.offer-link:hover{background:rgba(14,165,233,.15)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:22px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:11px;letter-spacing:2px;margin-bottom:16px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.btn-cancel{background:transparent;border:1px solid var(--border2);color:var(--text3);border-radius:6px;padding:8px 14px;font-family:'JetBrains Mono',monospace;font-size:12px}
.btn-confirm{background:linear-gradient(90deg,var(--accent2),var(--accent));border:none;border-radius:6px;color:#fff;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:8px 14px}
.btn-confirm:disabled{opacity:.4;cursor:not-allowed}
textarea{resize:vertical;height:70px}

/* Search info */
.search-info{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:13px;font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;line-height:1.7;margin-top:10px}

@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .9s linear infinite}

@media(max-width:720px){
  main{flex-direction:column}
  aside{width:100%;position:static}
  .header-tabs .tab-btn span.label{display:none}
}
@media(min-width:960px){
  .offers-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============================================================
// STATE
// ============================================================
const DEFAULT_FILTERS = {
  keywords: ["transport en commun","mobilité","cartographie","SIG","géomatique","GTFS","NeTEx","mobilités douces"],
  location: "Rouen",
  radius: 30,
  minSalary: 30000,
  contractTypes: ["CDI"]
};

const CONTRACT_COLORS = {CDI:"#22d3ee",CDD:"#f59e0b",Freelance:"#a78bfa",Stage:"#34d399",Alternance:"#fb923c"};
const SOURCE_ICONS = {"France Travail":"🏛️","APEC":"💼","Welcome to the Jungle":"🌿","Indeed":"🔍","LinkedIn":"🔗","Autre":"📋"};

let state = {
  filters: JSON.parse(JSON.stringify(DEFAULT_FILTERS)),
  offers: [],
  saved: [],
  loading: false,
  tab: "search",
  log: "",
  error: "",
  lastSearch: null,
  expandedCards: new Set(),
  showModal: false,
  modalForm: {},
  newKw: "",
  deferredPrompt: null,
  showInstall: false,
};

// Load persisted data
try {
  const persisted = JSON.parse(localStorage.getItem("transitjobs") || "{}");
  if (persisted.saved) state.saved = persisted.saved;
  if (persisted.filters) state.filters = { ...DEFAULT_FILTERS, ...persisted.filters };
} catch(e) {}

function persist() {
  try {
    localStorage.setItem("transitjobs", JSON.stringify({ saved: state.saved, filters: state.filters }));
  } catch(e) {}
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const app = document.getElementById("app");
  app.innerHTML = buildApp();
  bindEvents();
}

function buildApp() {
  return `
    ${buildHeader()}
    <main>
      <aside>
        ${buildFilters()}
        ${buildActions()}
        ${state.lastSearch ? buildLastSearch() : ""}
        ${buildInstallBanner()}
      </aside>
      <div class="content">
        ${state.tab === "search" ? buildSearchTab() : buildSavedTab()}
      </div>
    </main>
    ${state.showModal ? buildModal() : ""}
  `;
}

function buildHeader() {
  return `
  <header>
    <div class="logo">
      <div class="logo-icon">🚌</div>
      <div>
        <div class="logo-name">Transit<span>Jobs</span></div>
        <div class="logo-sub">TRANSPORT · MOBILITÉ · CARTO</div>
      </div>
    </div>
    <div class="header-tabs">
      <button class="tab-btn ${state.tab==='search'?'active':''}" data-tab="search">⌕ <span class="label">Recherche</span></button>
      <button class="tab-btn ${state.tab==='saved'?'active':''}" data-tab="saved">⭐ <span class="label">Favoris</span> (${state.saved.length})</button>
    </div>
  </header>`;
}

function buildFilters() {
  const f = state.filters;
  return `
  <div class="panel">
    <div class="panel-title">▸ Filtres de recherche</div>
    <div class="grid2">
      <div class="field-group">
        <label class="field-label">📍 Ville</label>
        <input id="loc" value="${e(f.location)}" placeholder="Rouen"/>
      </div>
      <div class="field-group">
        <label class="field-label">Rayon km</label>
        <input id="radius" type="number" value="${f.radius}" min="5" max="300"/>
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">💶 Salaire min brut annuel (€)</label>
      <input id="salary" type="number" value="${f.minSalary}" step="1000" min="20000"/>
    </div>
    <div class="field-group">
      <label class="field-label">Type de contrat</label>
      <div class="ct-wrap">
        ${["CDI","CDD","Freelance","Stage","Alternance"].map(ct => {
          const on = f.contractTypes.includes(ct);
          const col = CONTRACT_COLORS[ct]||"#94a3b8";
          return `<button class="ct-btn" data-ct="${ct}" style="${on?`background:${col}22;border-color:${col};color:${col}`:""}">${ct}</button>`;
        }).join("")}
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">🔑 Mots-clés</label>
      <div class="tags-wrap">
        ${f.keywords.map(kw => {
          return `<span class="tag" style="background:#22d3ee11;border-color:#22d3ee44;color:#22d3ee">${e(kw)}<button class="tag-remove" data-kw="${e(kw)}" style="color:#22d3ee">×</button></span>`;
        }).join("")}
      </div>
      <div class="kw-row">
        <input id="new-kw" value="${e(state.newKw)}" placeholder="Ajouter un mot-clé…"/>
        <button id="add-kw" style="background:var(--border);border:none;border-radius:5px;color:var(--text);width:34px;flex-shrink:0;font-size:18px">+</button>
      </div>
    </div>
    <button class="search-btn" id="search-btn" ${state.loading?"disabled":""}>
      ${state.loading?'<span class="spin">⟳</span> Recherche en cours…':'⌕ LANCER LA RECHERCHE'}
    </button>
  </div>`;
}

function buildActions() {
  const totalOffers = state.tab === "saved" ? state.saved : state.offers;
  const hasData = state.offers.length > 0 || state.saved.length > 0;
  return `
  <div style="display:flex;flex-direction:column;gap:8px">
    <button class="export-btn" id="export-btn" ${!hasData?"disabled":""}>
      📊 Exporter en Excel
    </button>
    <button class="add-manual-btn" id="add-manual-btn">
      + Ajouter une offre manuellement
    </button>
  </div>`;
}

function buildLastSearch() {
  const ls = state.lastSearch;
  return `
  <div class="search-info">
    ▸ DERNIÈRE RECHERCHE<br/>
    📅 ${e(ls.date)}<br/>
    📍 ${e(ls.filters.location)} &lt;${ls.filters.radius}km<br/>
    💶 ≥${ls.filters.minSalary.toLocaleString("fr-FR")}€<br/>
    📄 ${e(ls.filters.contractTypes.join(", "))}
    ${ls.info ? `<br/><br/><span style="color:var(--text4)">${e(ls.info)}</span>` : ""}
  </div>`;
}

function buildInstallBanner() {
  return `
  <div id="install-banner" class="${state.showInstall?'show':''}">
    <p>📱 Installer TransitJobs sur votre écran d'accueil</p>
    <button id="install-btn">Installer</button>
    <button id="install-close">×</button>
  </div>`;
}

function buildSearchTab() {
  let html = "";
  if (state.error) {
    html += `<div class="status-bar status-err">⚠ ${e(state.error)}</div>`;
  } else if (state.log) {
    html += `<div class="status-bar ${state.loading?'status-info':'status-ok'}">${state.loading?'<span class="spin">⟳</span>':''} ${e(state.log)}</div>`;
  }
  if (!state.loading && state.offers.length === 0 && !state.error) {
    html += `<div class="empty"><div class="empty-icon">🚌</div><p>Configurez vos filtres et lancez<br/>une recherche pour trouver des offres.</p></div>`;
  }
  if (state.offers.length > 0) {
    html += `<div class="offers-header">
      <span class="offers-count">${state.offers.length} offre${state.offers.length>1?"s":""} trouvée${state.offers.length>1?"s":""}</span>
      <button class="clear-btn" id="clear-btn">Effacer</button>
    </div>
    <div class="offers-grid">${state.offers.map((o,i) => buildCard(o, i)).join("")}</div>`;
  }
  return html;
}

function buildSavedTab() {
  if (state.saved.length === 0) {
    return `<div class="empty"><div class="empty-icon">⭐</div><p>Aucun favori pour l'instant.<br/>Étoilez les offres qui vous intéressent.</p></div>`;
  }
  return `<div class="offers-header"><span class="offers-count">${state.saved.length} offre${state.saved.length>1?"s":""} sauvegardée${state.saved.length>1?"s":""}</span></div>
  <div class="offers-grid">${state.saved.map((o,i) => buildCard(o, i)).join("")}</div>`;
}

function buildCard(offer, i) {
  const isSaved = state.saved.some(s => s._id === offer._id);
  const ct = offer.contractType || "N/A";
  const col = CONTRACT_COLORS[ct] || "#94a3b8";
  const expanded = state.expandedCards.has(offer._id);
  const src = SOURCE_ICONS[offer.source] || "📋";
  return `
  <div class="card" style="border-left:3px solid ${col};animation-delay:${i*.04}s" data-card-id="${offer._id}">
    <div class="card-header">
      <div>
        <div class="card-title">${e(offer.title)}</div>
        <div class="card-company">${src} ${e(offer.company||"")}</div>
      </div>
      <button class="star-btn" data-save="${offer._id}" style="filter:${isSaved?'none':'grayscale(1) opacity(.35)'}">${isSaved?"⭐":"☆"}</button>
    </div>
    <div class="card-tags">
      <span class="tag" style="background:${col}18;border-color:${col}44;color:${col}">${e(ct)}</span>
      ${offer.location?`<span class="tag" style="background:#94a3b818;border-color:#94a3b844;color:#94a3b8">📍 ${e(offer.location)}</span>`:""}
      ${offer.salary?`<span class="tag" style="background:#4ade8018;border-color:#4ade8044;color:#4ade80">💶 ${e(offer.salary)}</span>`:""}
      ${offer.datePosted?`<span class="tag" style="background:#94a3b818;border-color:#94a3b844;color:#94a3b8">🗓 ${e(offer.datePosted)}</span>`:""}
    </div>
    ${offer.description ? `
    <div class="card-desc" style="-webkit-line-clamp:${expanded?999:3}">${e(offer.description)}</div>
    ${offer.description.length>180?`<button class="expand-btn" data-expand="${offer._id}">${expanded?"▲ Réduire":"▼ Lire plus"}</button>`:""}
    `:""}
    <div class="card-footer">
      <span class="card-source">via ${e(offer.source||"?")}</span>
      ${offer.url&&offer.url!=="#"?`<a href="${e(offer.url)}" target="_blank" rel="noopener" class="offer-link">Voir l'offre →</a>`:""}
    </div>
  </div>`;
}

function buildModal() {
  const f = state.modalForm;
  return `
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title">▸ AJOUTER UNE OFFRE MANUELLEMENT</div>
      ${[
        {id:"m-title",label:"Intitulé du poste *",val:f.title||""},
        {id:"m-company",label:"Entreprise *",val:f.company||""},
        {id:"m-location",label:"Localisation",val:f.location||"Rouen"},
        {id:"m-salary",label:"Salaire",val:f.salary||""},
        {id:"m-url",label:"URL de l'offre",val:f.url||""},
        {id:"m-date",label:"Date de publication",val:f.datePosted||""},
      ].map(({id,label,val}) => `
        <div class="field-group">
          <label class="field-label">${label}</label>
          <input id="${id}" value="${e(val)}"/>
        </div>
      `).join("")}
      <div class="field-group">
        <label class="field-label">Type de contrat</label>
        <select id="m-ct">
          ${["CDI","CDD","Freelance","Stage","Alternance"].map(ct=>`<option value="${ct}" ${f.contractType===ct?"selected":""}>${ct}</option>`).join("")}
        </select>
      </div>
      <div class="field-group">
        <label class="field-label">Description</label>
        <textarea id="m-desc">${e(f.description||"")}</textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="modal-cancel">Annuler</button>
        <button class="btn-confirm" id="modal-confirm">Ajouter l'offre</button>
      </div>
    </div>
  </div>`;
}

function e(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ============================================================
// EVENTS
// ============================================================
function bindEvents() {
  // Tabs
  document.querySelectorAll("[data-tab]").forEach(btn => {
    btn.addEventListener("click", () => { state.tab = btn.dataset.tab; render(); });
  });

  // Filter inputs
  const loc = document.getElementById("loc");
  const radius = document.getElementById("radius");
  const salary = document.getElementById("salary");
  const newKw = document.getElementById("new-kw");

  if (loc) loc.addEventListener("input", () => { state.filters.location = loc.value; });
  if (radius) radius.addEventListener("input", () => { state.filters.radius = Number(radius.value); });
  if (salary) salary.addEventListener("input", () => { state.filters.minSalary = Number(salary.value); });
  if (newKw) {
    newKw.addEventListener("input", () => { state.newKw = newKw.value; });
    newKw.addEventListener("keydown", ev => { if (ev.key === "Enter") addKeyword(); });
  }

  // Add keyword
  const addKwBtn = document.getElementById("add-kw");
  if (addKwBtn) addKwBtn.addEventListener("click", addKeyword);

  // Remove keyword
  document.querySelectorAll("[data-kw]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.filters.keywords = state.filters.keywords.filter(k => k !== btn.dataset.kw);
      persist();
      render();
    });
  });

  // Contract type toggle
  document.querySelectorAll("[data-ct]").forEach(btn => {
    btn.addEventListener("click", () => {
      const ct = btn.dataset.ct;
      const idx = state.filters.contractTypes.indexOf(ct);
      if (idx >= 0) state.filters.contractTypes.splice(idx, 1);
      else state.filters.contractTypes.push(ct);
      persist();
      render();
    });
  });

  // Search
  const searchBtn = document.getElementById("search-btn");
  if (searchBtn) searchBtn.addEventListener("click", handleSearch);

  // Clear
  const clearBtn = document.getElementById("clear-btn");
  if (clearBtn) clearBtn.addEventListener("click", () => { state.offers = []; state.log = ""; render(); });

  // Save/star
  document.querySelectorAll("[data-save]").forEach(btn => {
    btn.addEventListener("click", () => toggleSave(btn.dataset.save));
  });

  // Expand card
  document.querySelectorAll("[data-expand]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.expand;
      if (state.expandedCards.has(id)) state.expandedCards.delete(id);
      else state.expandedCards.add(id);
      render();
    });
  });

  // Export
  const exportBtn = document.getElementById("export-btn");
  if (exportBtn) exportBtn.addEventListener("click", exportExcel);

  // Manual add
  const addManual = document.getElementById("add-manual-btn");
  if (addManual) addManual.addEventListener("click", () => { state.showModal = true; state.modalForm = {}; render(); });

  // Modal
  const modalOverlay = document.getElementById("modal-overlay");
  if (modalOverlay) {
    modalOverlay.addEventListener("click", e => { if (e.target === modalOverlay) closeModal(); });
  }
  const modalCancel = document.getElementById("modal-cancel");
  if (modalCancel) modalCancel.addEventListener("click", closeModal);

  const modalConfirm = document.getElementById("modal-confirm");
  if (modalConfirm) modalConfirm.addEventListener("click", submitModal);

  // Install PWA
  const installBtn = document.getElementById("install-btn");
  if (installBtn) installBtn.addEventListener("click", () => {
    if (state.deferredPrompt) {
      state.deferredPrompt.prompt();
      state.deferredPrompt.userChoice.then(() => { state.showInstall = false; render(); });
    }
  });
  const installClose = document.getElementById("install-close");
  if (installClose) installClose.addEventListener("click", () => { state.showInstall = false; render(); });
}

function addKeyword() {
  const kw = (state.newKw || "").trim();
  if (kw && !state.filters.keywords.includes(kw)) {
    state.filters.keywords.push(kw);
    state.newKw = "";
    persist();
    render();
  }
}

function closeModal() { state.showModal = false; state.modalForm = {}; render(); }

function submitModal() {
  const title = document.getElementById("m-title")?.value.trim();
  const company = document.getElementById("m-company")?.value.trim();
  if (!title || !company) return;
  const offer = {
    _id: "manual-" + Date.now(),
    title,
    company,
    location: document.getElementById("m-location")?.value.trim(),
    salary: document.getElementById("m-salary")?.value.trim(),
    url: document.getElementById("m-url")?.value.trim(),
    datePosted: document.getElementById("m-date")?.value.trim(),
    contractType: document.getElementById("m-ct")?.value,
    description: document.getElementById("m-desc")?.value.trim(),
    source: "Autre",
  };
  state.offers = [offer, ...state.offers];
  state.showModal = false;
  render();
}

function toggleSave(id) {
  const allOffers = [...state.offers, ...state.saved];
  const offer = allOffers.find(o => o._id === id);
  if (!offer) return;
  const idx = state.saved.findIndex(s => s._id === id);
  if (idx >= 0) state.saved.splice(idx, 1);
  else state.saved.push(offer);
  persist();
  render();
}

// ============================================================
// SEARCH (Claude API + web_search)
// ============================================================
async function handleSearch() {
  state.loading = true;
  state.error = "";
  state.log = "🔍 Interrogation des sources publiques (France Travail, APEC, WTTJ…)";
  render();

  const f = state.filters;
  const systemPrompt = `Tu es un assistant de veille emploi spécialisé dans les secteurs transport en commun, mobilité, SIG et cartographie en France.
Recherche des offres d'emploi actuelles sur les job boards publics (France Travail francetravail.fr, APEC apec.fr, Welcome to the Jungle welcometothejungle.com, Indeed indeed.fr, LinkedIn linkedin.com/jobs).
Retourne UNIQUEMENT un objet JSON valide sans markdown ni backticks, sans texte autour. Structure exacte :
{"offers":[{"title":"","company":"","location":"","salary":"","contractType":"CDI|CDD|Freelance|Stage|Alternance","description":"","url":"","source":"France Travail|APEC|Welcome to the Jungle|Indeed|LinkedIn|Autre","datePosted":""}],"searchInfo":""}
Trouve au moins 8 offres pertinentes et récentes avec leurs URLs directes.`;

  const userPrompt = `Critères de recherche :
- Mots-clés : ${f.keywords.join(", ")}
- Localisation : ${f.location} et rayon ${f.radius}km (Normandie, Seine-Maritime, Eure)
- Salaire minimum : ${f.minSalary.toLocaleString("fr-FR")}€ brut annuel
- Types de contrat : ${f.contractTypes.join(", ")}
- Secteurs cibles : transport en commun, mobilité urbaine, cartographie, SIG, géomatique, données GTFS/NeTEx, développement logiciel mobilité
Cherche sur France Travail, APEC, Welcome to the Jungle, Indeed, LinkedIn. Retourne uniquement le JSON.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 4000,
        system: systemPrompt,
        tools: [{"type":"web_search_20250305","name":"web_search"}],
        messages: [{role:"user",content:userPrompt}]
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || `Erreur ${res.status}`);

    let fullText = data.content.filter(b => b.type === "text").map(b => b.text).join("");
    const clean = fullText.replace(/```json\s*/gi,"").replace(/```\s*/gi,"").trim();
    const jStart = clean.indexOf("{");
    const jEnd = clean.lastIndexOf("}");
    if (jStart < 0 || jEnd < 0) throw new Error("Réponse JSON invalide");
    const parsed = JSON.parse(clean.slice(jStart, jEnd+1));

    state.offers = (parsed.offers||[]).map((o,i) => ({...o, _id:`${Date.now()}-${i}`}));
    state.lastSearch = {
      date: new Date().toLocaleString("fr-FR"),
      filters: {...f, contractTypes:[...f.contractTypes], keywords:[...f.keywords]},
      info: parsed.searchInfo||""
    };
    state.log = `✅ ${state.offers.length} offre(s) trouvée(s)`;

  } catch(err) {
    state.error = err.message;
    state.log = "";
  }
  state.loading = false;
  render();
}

// ============================================================
// EXCEL EXPORT
// ============================================================
function exportExcel() {
  if (typeof XLSX === "undefined") {
    alert("La librairie SheetJS n'est pas encore chargée. Réessayez dans quelques secondes.");
    return;
  }

  const wb = XLSX.utils.book_new();
  const cols = [
    {label:"Intitulé du poste", key:"title"},
    {label:"Entreprise", key:"company"},
    {label:"Localisation", key:"location"},
    {label:"Salaire", key:"salary"},
    {label:"Contrat", key:"contractType"},
    {label:"Source", key:"source"},
    {label:"Date publication", key:"datePosted"},
    {label:"URL", key:"url"},
    {label:"Description", key:"description"},
  ];

  function makeSheet(offers, name) {
    if (offers.length === 0) return;
    const rows = [cols.map(c => c.label)];
    offers.forEach(o => rows.push(cols.map(c => o[c.key]||"")));
    const ws = XLSX.utils.aoa_to_sheet(rows);

    // Column widths
    ws["!cols"] = [
      {wch:35},{wch:25},{wch:20},{wch:18},{wch:12},
      {wch:20},{wch:14},{wch:40},{wch:60}
    ];

    // Header style
    const headerStyle = {
      font:{bold:true,color:{rgb:"FFFFFF"}},
      fill:{fgColor:{rgb:"0284C7"}},
      alignment:{horizontal:"center"},
      border:{bottom:{style:"medium",color:{rgb:"0EA5E9"}}}
    };
    cols.forEach((_, ci) => {
      const cell = XLSX.utils.encode_cell({r:0,c:ci});
      if (ws[cell]) ws[cell].s = headerStyle;
    });

    // Row styles alternées
    offers.forEach((offer, ri) => {
      const bgColor = ri % 2 === 0 ? "0D1526" : "0F1A30";
      const ctColor = (CONTRACT_COLORS[offer.contractType]||"#94a3b8").replace("#","");
      cols.forEach((col, ci) => {
        const cell = XLSX.utils.encode_cell({r:ri+1,c:ci});
        if (!ws[cell]) return;
        ws[cell].s = {
          font:{color:{rgb:"E2E8F0"},name:"Calibri",sz:10},
          fill:{fgColor:{rgb:bgColor}},
          alignment:{wrapText:true,vertical:"top"},
          border:{
            top:{style:"thin",color:{rgb:"1E3A5F"}},
            bottom:{style:"thin",color:{rgb:"1E3A5F"}},
            left:{style:"thin",color:{rgb:"1E3A5F"}},
            right:{style:"thin",color:{rgb:"1E3A5F"}},
          }
        };
        // Coloriser colonne Contrat
        if (col.key === "contractType" && offer.contractType) {
          ws[cell].s.font = {...ws[cell].s.font, color:{rgb:ctColor}, bold:true};
        }
        // URL en hyperlien
        if (col.key === "url" && offer.url && offer.url !== "#") {
          ws[cell].l = {Target:offer.url};
          ws[cell].s.font = {...ws[cell].s.font, color:{rgb:"0EA5E9"}, underline:true};
        }
      });
    });

    // Freeze first row
    ws["!freeze"] = {xSplit:0,ySplit:1};
    ws["!autofilter"] = {ref:`A1:I${offers.length+1}`};

    XLSX.utils.book_append_sheet(wb, ws, name);
  }

  makeSheet(state.offers, "Toutes les offres");
  makeSheet(state.saved, "Favoris ⭐");

  // Feuille résumé
  const now = new Date();
  const f = state.filters;
  const summaryData = [
    ["📊 TransitJobs — Export veille emploi"],
    [""],
    ["Date d'export", now.toLocaleString("fr-FR")],
    ["Localisation", `${f.location} (rayon ${f.radius}km)`],
    ["Salaire min", `${f.minSalary.toLocaleString("fr-FR")} € brut/an`],
    ["Types de contrat", f.contractTypes.join(", ")],
    ["Mots-clés", f.keywords.join(", ")],
    [""],
    ["Offres trouvées", state.offers.length],
    ["Offres sauvegardées", state.saved.length],
  ];
  const wsSummary = XLSX.utils.aoa_to_sheet(summaryData);
  wsSummary["!cols"] = [{wch:22},{wch:50}];
  if (wsSummary["A1"]) wsSummary["A1"].s = {font:{bold:true,sz:13,color:{rgb:"0EA5E9"}}};
  XLSX.utils.book_append_sheet(wb, wsSummary, "Résumé");

  const filename = `transitjobs_${now.toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(wb, filename);
}

window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  state.deferredPrompt = e;
  state.showInstall = true;
  render();
});

window.addEventListener("appinstalled", () => {
  state.showInstall = false;
  state.deferredPrompt = null;
  render();
});

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}

// ============================================================
// INIT
// ============================================================
render();
</script>
