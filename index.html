<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#FAFAF8"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="TransitJobs"/>
<link rel="manifest" href="./manifest.json"/>
<title>TransitJobs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFAF8;--white:#FFFFFF;
  --border:#E8E5DF;--border-soft:#F0EDE8;
  --text:#1C1C1C;--text-2:#555450;--text-3:#8C8A86;--text-4:#C0BDB8;
  --accent:#1A6B4A;--accent-light:#EAF4EF;--accent-hover:#155A3E;
  --radius:10px;--radius-sm:6px;--radius-full:100px;
}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
input,select,textarea{
  background:var(--white);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:14px;
  padding:9px 12px;outline:none;transition:border-color .18s;width:100%;
  -webkit-appearance:none;appearance:none
}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder{color:var(--text-4)}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
a{color:var(--accent);text-decoration:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── SETUP SCREEN ── */
#setup-screen{
  position:fixed;inset:0;background:var(--bg);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:24px;
}
#setup-screen.hidden{display:none}
.setup-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:14px;padding:32px;width:100%;max-width:420px;
  box-shadow:0 8px 40px rgba(0,0,0,.08);
}
.setup-logo{font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px}
.setup-logo span{color:var(--accent)}
.setup-sub{font-size:13px;color:var(--text-3);margin-bottom:24px}
.setup-label{display:block;font-size:11px;font-weight:600;color:var(--text-3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px}
.setup-hint{font-size:12px;color:var(--text-3);margin-top:8px;line-height:1.6}
.setup-hint a{color:var(--accent);text-decoration:underline}
.setup-btn{
  width:100%;background:var(--accent);border:none;border-radius:var(--radius-sm);
  color:#fff;font-size:14px;font-weight:600;padding:13px;margin-top:20px;
  transition:background .15s;
}
.setup-btn:hover{background:var(--accent-hover)}
.setup-key-wrap{position:relative}
.setup-key-wrap input{padding-right:44px;font-family:monospace;font-size:13px;letter-spacing:.5px}
.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-3);font-size:13px;padding:0}

/* ── HEADER ── */
header{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:0 24px;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.wordmark{font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.wordmark span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:2px}
.tab-btn{background:none;border:none;color:var(--text-3);font-size:14px;font-weight:500;padding:7px 12px;border-radius:var(--radius-sm);transition:all .15s}
.tab-btn.active{color:var(--text);background:var(--bg)}
.tab-badge{background:var(--accent);color:#fff;border-radius:var(--radius-full);font-size:10px;font-weight:600;padding:1px 6px;margin-left:4px;display:inline-block;vertical-align:middle;line-height:16px}
.key-chip{background:var(--accent-light);border:1px solid #A8D5BC;border-radius:var(--radius-full);color:var(--accent);font-size:11px;font-weight:600;padding:3px 10px;cursor:pointer;transition:background .15s}
.key-chip:hover{background:#D3EBDF}

/* ── LAYOUT ── */
main{display:flex;gap:20px;max-width:1200px;margin:0 auto;padding:24px 20px;align-items:flex-start}
aside{width:268px;flex-shrink:0;position:sticky;top:70px;display:flex;flex-direction:column;gap:10px}
.content{flex:1;min-width:0}

/* ── PANELS ── */
.panel{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.panel-title{font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
.field-group{margin-bottom:12px}
.field-label{display:block;font-size:11px;font-weight:600;color:var(--text-3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.ct-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.ct-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-full);color:var(--text-2);font-size:12px;font-weight:500;padding:5px 12px;transition:all .15s}
.ct-btn.on-CDI{background:#EAF4EF;border-color:#A8D5BC;color:#1A6B4A}
.ct-btn.on-CDD{background:#FFF3E8;border-color:#FFCA99;color:#C05A00}
.ct-btn.on-Freelance{background:#EEF2FF;border-color:#C7D2FE;color:#3D52A0}
.ct-btn.on-Stage{background:#F5F0FF;border-color:#DDD0FF;color:#6D3FA0}
.ct-btn.on-Alternance{background:#FFFBEA;border-color:#FFE999;color:#946C00}

.tag{display:inline-flex;align-items:center;gap:3px;border-radius:var(--radius-full);padding:3px 10px;font-size:12px;font-weight:500}
.tag-remove{background:none;border:none;font-size:13px;line-height:1;padding:0;cursor:pointer;opacity:.55}
.tags-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.kw-row{display:flex;gap:6px}
.kw-add-btn{background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:18px;font-weight:300;width:38px;flex-shrink:0}

.btn-search{width:100%;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:14px;font-weight:600;padding:12px;margin-top:4px;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-search:hover:not(:disabled){background:var(--accent-hover)}
.btn-search:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text-2);font-size:13px;font-weight:500;padding:10px;transition:all .15s}
.btn-secondary:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.btn-secondary:disabled{opacity:.35;cursor:not-allowed}
.btn-dashed{width:100%;background:none;border:1.5px dashed var(--border);border-radius:var(--radius-sm);color:var(--text-4);font-size:13px;padding:10px;transition:all .15s}
.btn-dashed:hover{border-color:var(--accent);color:var(--accent);border-style:solid}

.status{border-radius:var(--radius-sm);padding:11px 14px;font-size:13px;margin-bottom:16px;display:flex;align-items:flex-start;gap:8px;line-height:1.45}
.status-ok{background:#EAF4EF;color:#1A6B4A;border:1px solid #A8D5BC}
.status-err{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
.status-loading{background:var(--white);color:var(--text-2);border:1px solid var(--border)}

.empty{text-align:center;padding:64px 24px;border:1.5px dashed var(--border);border-radius:var(--radius);background:var(--white)}
.empty-line{width:28px;height:2px;background:var(--border);margin:0 auto 16px}
.empty p{color:var(--text-3);font-size:14px;line-height:1.75}

.offers-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.offers-count{font-size:13px;color:var(--text-3);font-weight:500}
.offers-clear{background:none;border:none;color:var(--text-4);font-size:13px}
.offers-grid{display:grid;grid-template-columns:1fr;gap:10px}

.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:box-shadow .2s,border-color .2s;animation:fadeUp .28s ease both}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);border-color:#D5D1CB}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:9px}
.card-title{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:3px}
.card-company{font-size:13px;color:var(--text-3)}
.save-btn{background:none;border:none;font-size:16px;padding:2px;color:var(--text-4);transition:color .15s;flex-shrink:0;line-height:1}
.save-btn.saved,.save-btn:hover{color:var(--accent)}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.tag-CDI{background:#EAF4EF;color:#1A6B4A}
.tag-CDD{background:#FFF3E8;color:#C05A00}
.tag-Freelance{background:#EEF2FF;color:#3D52A0}
.tag-Stage{background:#F5F0FF;color:#6D3FA0}
.tag-Alternance{background:#FFFBEA;color:#946C00}
.tag-meta{background:var(--bg);color:var(--text-3)}
.tag-salary{background:#EAF4EF;color:#1A6B4A}
.card-desc{font-size:13px;color:var(--text-2);line-height:1.65;overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical}
.expand-btn{background:none;border:none;color:var(--accent);font-size:12px;font-weight:500;padding:4px 0 0;cursor:pointer}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:13px;padding-top:11px;border-top:1px solid var(--border-soft)}
.card-source{font-size:11px;color:var(--text-4)}
.offer-link{font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-light);border-radius:var(--radius-full);padding:5px 14px;transition:background .15s}
.offer-link:hover{background:#D3EBDF}

.search-meta{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;font-size:12px;color:var(--text-3);line-height:1.85}
.search-meta strong{color:var(--text-2);font-weight:600;display:block;margin-bottom:3px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(28,28,28,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--white);border-radius:var(--radius);padding:22px;width:100%;max-width:460px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.modal-title{font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border-soft)}
.btn-cancel{background:var(--bg);border:1.5px solid var(--border);color:var(--text-2);border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;font-weight:500}
.btn-confirm{background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:13px;font-weight:600;padding:8px 18px}
.btn-confirm:disabled{opacity:.4;cursor:not-allowed}
textarea{resize:vertical;height:70px;font-size:13px}

#install-banner{display:none;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;align-items:center;gap:10px;justify-content:space-between}
#install-banner.show{display:flex}
#install-banner p{font-size:13px;color:var(--text-2);flex:1}
#install-btn{background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:12px;font-weight:600;padding:6px 12px;white-space:nowrap}
#install-close{background:none;border:none;color:var(--text-4);font-size:20px;line-height:1;padding:0}

.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .75s linear infinite}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:740px){header{padding:0 16px}main{flex-direction:column;padding:16px}aside{width:100%;position:static}}
@media(min-width:960px){.offers-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-logo">Transit<span>Jobs</span></div>
    <div class="setup-sub">Veille emploi · Transport &amp; Mobilité</div>
    <label class="setup-label">Clé API Anthropic</label>
    <div class="setup-key-wrap">
      <input id="setup-key" type="password" placeholder="sk-ant-api03-…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
      <button class="toggle-pw" id="toggle-pw-btn" type="button">Voir</button>
    </div>
    <p class="setup-hint">
      Stockée uniquement sur cet appareil, jamais partagée.<br/>
      <a href="https://console.anthropic.com/settings/keys" target="_blank">Obtenir une clé sur console.anthropic.com →</a>
    </p>
    <button class="setup-btn" id="setup-confirm-btn">Accéder à l'application</button>
  </div>
</div>

<div id="app" style="display:none"></div>

<script>
// ─────────────────────────────────────────
// STORAGE
// ─────────────────────────────────────────
const DEF={
  keywords:["transport en commun","mobilité","cartographie","SIG","géomatique","GTFS","NeTEx","mobilités douces"],
  location:"Rouen",radius:30,minSalary:30000,contractTypes:["CDI"]
};
let S={
  filters:JSON.parse(JSON.stringify(DEF)),
  offers:[],saved:[],
  loading:false,tab:"search",
  log:"",error:"",
  lastSearch:null,expanded:new Set(),
  showModal:false,modalForm:{},
  newKw:"",
  deferredPrompt:null,showInstall:false
};
try{
  const p=JSON.parse(localStorage.getItem("tj")||"{}");
  if(p.saved)S.saved=p.saved;
  if(p.filters)S.filters={...DEF,...p.filters};
  // clean up any accidentally added API keys from keywords
  S.filters.keywords=S.filters.keywords.filter(k=>!k.startsWith("sk-ant-"));
}catch(e){}

function getKey(){return localStorage.getItem("tj_key")||""}
function setKey(k){localStorage.setItem("tj_key",k.trim())}
function persist(){try{localStorage.setItem("tj",JSON.stringify({saved:S.saved,filters:S.filters}))}catch(e){}}
function x(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function ctCls(ct){return{CDI:"tag-CDI",CDD:"tag-CDD",Freelance:"tag-Freelance",Stage:"tag-Stage",Alternance:"tag-Alternance"}[ct]||"tag-meta"}

// ─────────────────────────────────────────
// SETUP SCREEN
// ─────────────────────────────────────────
function initSetup(){
  const key=getKey();
  if(key){
    showApp();
    return;
  }
  document.getElementById("setup-screen").classList.remove("hidden");

  document.getElementById("toggle-pw-btn").onclick=function(){
    const inp=document.getElementById("setup-key");
    if(inp.type==="password"){inp.type="text";this.textContent="Masquer"}
    else{inp.type="password";this.textContent="Voir"}
  };
  document.getElementById("setup-confirm-btn").onclick=function(){
    const val=(document.getElementById("setup-key").value||"").trim();
    if(!val||!val.startsWith("sk-ant-")){
      document.getElementById("setup-key").style.borderColor="#EF4444";
      document.getElementById("setup-key").placeholder="Clé invalide — commence par sk-ant-…";
      return;
    }
    setKey(val);
    showApp();
  };
  document.getElementById("setup-key").addEventListener("keydown",function(e){
    if(e.key==="Enter")document.getElementById("setup-confirm-btn").click();
  });
}

function showApp(){
  document.getElementById("setup-screen").classList.add("hidden");
  document.getElementById("app").style.display="";
  render();
}

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function render(){document.getElementById("app").innerHTML=buildApp();bindAll()}

function buildApp(){
  return hdr()+`<main><aside>${filtersBlock()}${actionsBlock()}${S.lastSearch?metaBlock():""}${installBlock()}</aside><div class="content">${S.tab==="search"?searchTab():savedTab()}</div></main>${S.showModal?modalBlock():""}`;
}

function hdr(){
  const k=getKey();
  const keyMasked=k?`${k.slice(0,8)}…${k.slice(-4)}`:"";
  return`<header>
    <div class="wordmark">Transit<span>Jobs</span></div>
    <div class="header-right">
      <button class="tab-btn${S.tab==="search"?" active":""}" data-tab="search">Recherche</button>
      <button class="tab-btn${S.tab==="saved"?" active":""}" data-tab="saved">Favoris${S.saved.length?`<span class="tab-badge">${S.saved.length}</span>`:""}</button>
      <button class="key-chip" id="change-key-btn" title="Modifier la clé API">API ···</button>
    </div>
  </header>`;
}

function filtersBlock(){
  const f=S.filters;
  return`<div class="panel">
    <div class="panel-title">Filtres</div>
    <div class="grid2">
      <div class="field-group"><label class="field-label">Ville</label><input id="loc" value="${x(f.location)}" placeholder="Rouen" autocomplete="off"/></div>
      <div class="field-group"><label class="field-label">Rayon km</label><input id="radius" inputmode="numeric" pattern="[0-9]*" value="${f.radius}" autocomplete="off"/></div>
    </div>
    <div class="field-group"><label class="field-label">Salaire min € brut/an</label><input id="salary" inputmode="numeric" pattern="[0-9]*" value="${f.minSalary}" autocomplete="off"/></div>
    <div class="field-group"><label class="field-label">Type de contrat</label>
      <div class="ct-wrap">${["CDI","CDD","Freelance","Stage","Alternance"].map(ct=>`<button class="ct-btn${f.contractTypes.includes(ct)?" on-"+ct:""}" data-ct="${ct}">${ct}</button>`).join("")}</div>
    </div>
    <div class="field-group"><label class="field-label">Mots-clés</label>
      <div class="tags-wrap">${f.keywords.map(kw=>`<span class="tag" style="background:var(--accent-light);color:var(--accent)">${x(kw)}<button class="tag-remove" data-kw="${x(kw)}">×</button></span>`).join("")}</div>
      <div class="kw-row"><input id="new-kw" value="${x(S.newKw)}" placeholder="Ajouter un mot-clé" autocomplete="off"/><button class="kw-add-btn" id="add-kw">+</button></div>
    </div>
    <button class="btn-search" id="search-btn" ${S.loading?"disabled":""}>${S.loading?`<span class="spinner"></span> Recherche en cours`:"Lancer la recherche"}</button>
  </div>`;
}

function actionsBlock(){
  const ok=S.offers.length>0||S.saved.length>0;
  return`<button class="btn-secondary" id="export-btn" ${!ok?"disabled":""}>${window.XLSX?"Exporter en Excel":"Chargement…"}</button>
  <button class="btn-dashed" id="add-manual-btn">+ Ajouter une offre manuellement</button>`;
}

function metaBlock(){
  const l=S.lastSearch;
  return`<div class="search-meta"><strong>Dernière recherche</strong>${x(l.date)}<br/>${x(l.filters.location)} · ${l.filters.radius} km · ≥ ${Number(l.filters.minSalary).toLocaleString("fr-FR")} €<br/>${x(l.filters.contractTypes.join(", "))}</div>`;
}

function installBlock(){
  return`<div id="install-banner" class="${S.showInstall?"show":""}"><p>Installer l'app sur votre écran d'accueil</p><button id="install-btn">Installer</button><button id="install-close">×</button></div>`;
}

function searchTab(){
  let h="";
  if(S.error) h+=`<div class="status status-err">${x(S.error)}</div>`;
  else if(S.log) h+=`<div class="status ${S.loading?"status-loading":"status-ok"}">${S.loading?`<span class="spinner" style="border-color:rgba(28,28,28,.12);border-top-color:var(--text-2)"></span>`:""}${x(S.log)}</div>`;
  if(!S.loading&&!S.offers.length&&!S.error) h+=`<div class="empty"><div class="empty-line"></div><p>Configurez vos filtres et lancez<br/>une recherche pour découvrir les offres.</p></div>`;
  if(S.offers.length) h+=`<div class="offers-header"><span class="offers-count">${S.offers.length} offre${S.offers.length>1?"s":""} trouvée${S.offers.length>1?"s":""}</span><button class="offers-clear" id="clear-btn">Effacer</button></div><div class="offers-grid">${S.offers.map((o,i)=>cardBlock(o,i)).join("")}</div>`;
  return h;
}

function savedTab(){
  if(!S.saved.length) return`<div class="empty"><div class="empty-line"></div><p>Aucun favori.<br/>Sauvegardez les offres qui vous intéressent.</p></div>`;
  return`<div class="offers-header"><span class="offers-count">${S.saved.length} offre${S.saved.length>1?"s":""} sauvegardée${S.saved.length>1?"s":""}</span></div><div class="offers-grid">${S.saved.map((o,i)=>cardBlock(o,i)).join("")}</div>`;
}

function cardBlock(o,i){
  const sv=S.saved.some(s=>s._id===o._id),exp=S.expanded.has(o._id);
  return`<div class="card" style="animation-delay:${i*.04}s">
    <div class="card-header"><div>
      <div class="card-title">${x(o.title)}</div>
      <div class="card-company">${x(o.company||"")}</div>
    </div><button class="save-btn${sv?" saved":""}" data-save="${o._id}">${sv?"♥":"♡"}</button></div>
    <div class="card-tags">
      ${o.contractType?`<span class="tag ${ctCls(o.contractType)}">${x(o.contractType)}</span>`:""}
      ${o.location?`<span class="tag tag-meta">${x(o.location)}</span>`:""}
      ${o.salary?`<span class="tag tag-salary">${x(o.salary)}</span>`:""}
      ${o.datePosted?`<span class="tag tag-meta">${x(o.datePosted)}</span>`:""}
    </div>
    ${o.description?`<div class="card-desc" style="-webkit-line-clamp:${exp?999:3}">${x(o.description)}</div>${o.description.length>160?`<button class="expand-btn" data-expand="${o._id}">${exp?"Voir moins":"Voir plus"}</button>`:""}`:""}
    <div class="card-footer">
      <span class="card-source">via ${x(o.source||"—")}</span>
      ${o.url&&o.url!=="#"?`<a href="${x(o.url)}" target="_blank" rel="noopener" class="offer-link">Voir l'offre</a>`:""}
    </div>
  </div>`;
}

function modalBlock(){
  const f=S.modalForm;
  return`<div class="modal-overlay" id="modal-overlay"><div class="modal">
    <div class="modal-title">Ajouter une offre</div>
    ${[["m-title","Intitulé *",f.title||""],["m-company","Entreprise *",f.company||""],["m-location","Localisation",f.location||""],["m-salary","Salaire",f.salary||""],["m-url","URL",f.url||""],["m-date","Date",f.datePosted||""]].map(([id,l,v])=>`<div class="field-group"><label class="field-label">${l}</label><input id="${id}" value="${x(v)}" autocomplete="off"/></div>`).join("")}
    <div class="field-group"><label class="field-label">Contrat</label>
      <select id="m-ct">${["CDI","CDD","Freelance","Stage","Alternance"].map(ct=>`<option value="${ct}"${f.contractType===ct?" selected":""}>${ct}</option>`).join("")}</select>
    </div>
    <div class="field-group"><label class="field-label">Description</label><textarea id="m-desc">${x(f.description||"")}</textarea></div>
    <div class="modal-footer">
      <button class="btn-cancel" id="modal-cancel">Annuler</button>
      <button class="btn-confirm" id="modal-confirm">Ajouter</button>
    </div>
  </div></div>`;
}

// ─────────────────────────────────────────
// EVENTS
// ─────────────────────────────────────────
function bindAll(){
  document.querySelectorAll("[data-tab]").forEach(e=>e.addEventListener("click",()=>{S.tab=e.dataset.tab;render()}));
  const loc=document.getElementById("loc"),rad=document.getElementById("radius"),sal=document.getElementById("salary"),nkw=document.getElementById("new-kw");
  if(loc)loc.addEventListener("input",()=>S.filters.location=loc.value);
  if(rad)rad.addEventListener("input",()=>{const v=parseInt((rad.value||"").replace(/\D/g,""));if(!isNaN(v)&&v>0)S.filters.radius=v});
  if(sal)sal.addEventListener("input",()=>{const v=parseInt((sal.value||"").replace(/\D/g,""));if(!isNaN(v)&&v>0)S.filters.minSalary=v});
  if(nkw){
    nkw.addEventListener("input",()=>S.newKw=nkw.value);
    nkw.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();addKw()}});
  }
  on("add-kw",addKw);
  document.querySelectorAll("[data-kw]").forEach(e=>e.addEventListener("click",()=>{S.filters.keywords=S.filters.keywords.filter(k=>k!==e.dataset.kw);persist();render()}));
  document.querySelectorAll("[data-ct]").forEach(e=>e.addEventListener("click",()=>{const ct=e.dataset.ct,i=S.filters.contractTypes.indexOf(ct);i>=0?S.filters.contractTypes.splice(i,1):S.filters.contractTypes.push(ct);persist();render()}));
  on("search-btn",doSearch);
  on("clear-btn",()=>{S.offers=[];S.log="";render()});
  document.querySelectorAll("[data-save]").forEach(e=>e.addEventListener("click",()=>toggleSave(e.dataset.save)));
  document.querySelectorAll("[data-expand]").forEach(e=>e.addEventListener("click",()=>{const id=e.dataset.expand;S.expanded.has(id)?S.expanded.delete(id):S.expanded.add(id);render()}));
  on("export-btn",doExport);
  on("add-manual-btn",()=>{S.showModal=true;S.modalForm={};render()});
  const ov=document.getElementById("modal-overlay");
  if(ov)ov.addEventListener("click",e=>{if(e.target===ov)closeModal()});
  on("modal-cancel",closeModal);
  on("modal-confirm",submitModal);
  // Change API key → go back to setup screen
  on("change-key-btn",()=>{
    localStorage.removeItem("tj_key");
    document.getElementById("app").style.display="none";
    document.getElementById("setup-screen").classList.remove("hidden");
    document.getElementById("setup-key").value="";
    document.getElementById("setup-key").type="password";
    document.getElementById("toggle-pw-btn").textContent="Voir";
    initSetup();
  });
  on("install-btn",()=>{if(S.deferredPrompt){S.deferredPrompt.prompt();S.deferredPrompt.userChoice.then(()=>{S.showInstall=false;render()})}});
  on("install-close",()=>{S.showInstall=false;render()});
}

function on(id,fn){const e=document.getElementById(id);if(e)e.addEventListener("click",fn)}
function addKw(){
  const kw=(S.newKw||"").trim();
  if(!kw)return;
  if(kw.startsWith("sk-ant-")){alert("Ce champ est pour les mots-clés de recherche.\nPour modifier votre clé API, cliquez sur « API ··· » en haut à droite.");S.newKw="";render();return}
  if(!S.filters.keywords.includes(kw)){S.filters.keywords.push(kw);S.newKw="";persist();render()}
}
function closeModal(){S.showModal=false;S.modalForm={};render()}
function submitModal(){
  const title=document.getElementById("m-title")?.value.trim(),company=document.getElementById("m-company")?.value.trim();
  if(!title||!company)return;
  S.offers=[{_id:"manual-"+Date.now(),title,company,
    location:document.getElementById("m-location")?.value.trim(),
    salary:document.getElementById("m-salary")?.value.trim(),
    url:document.getElementById("m-url")?.value.trim(),
    datePosted:document.getElementById("m-date")?.value.trim(),
    contractType:document.getElementById("m-ct")?.value,
    description:document.getElementById("m-desc")?.value.trim(),
    source:"Manuel"},...S.offers];
  closeModal();
}
function toggleSave(id){
  const offer=[...S.offers,...S.saved].find(o=>o._id===id);if(!offer)return;
  const i=S.saved.findIndex(s=>s._id===id);
  i>=0?S.saved.splice(i,1):S.saved.push(offer);
  persist();render();
}

// ─────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────
async function doSearch(){
  const key=getKey();
  if(!key)return;
  S.loading=true;S.error="";
  S.log="Recherche en cours…";
  render();
  const f=S.filters;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":key,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:4000,
        system:`Tu es un assistant de veille emploi spécialisé dans les secteurs transport, mobilité, SIG et cartographie en France. Recherche des offres d'emploi actuelles sur les job boards publics (France Travail, APEC, Welcome to the Jungle, Indeed, LinkedIn). Retourne UNIQUEMENT un JSON valide sans markdown sans backtick. Format : {"offers":[{"title":"","company":"","location":"","salary":"","contractType":"CDI|CDD|Freelance|Stage|Alternance","description":"","url":"","source":"France Travail|APEC|Welcome to the Jungle|Indeed|LinkedIn|Autre","datePosted":""}],"searchInfo":""}`,
        tools:[{"type":"web_search_20250305","name":"web_search"}],
        messages:[{role:"user",content:`Cherche des offres : mots-clés ${f.keywords.join(", ")} · ${f.location} rayon ${f.radius}km · salaire minimum ${f.minSalary} euros brut annuel · contrats ${f.contractTypes.join(", ")} · secteurs transport mobilité cartographie SIG GTFS NeTEx. Sources : France Travail APEC WTTJ Indeed LinkedIn. Retourne le JSON uniquement.`}]
      })
    });

    // Read the raw text first for debugging
    const rawText=await res.text();

    if(!res.ok){
      let errMsg=`Erreur ${res.status}`;
      try{const errJson=JSON.parse(rawText);errMsg=errJson.error?.message||errMsg}catch(e){}
      throw new Error(errMsg);
    }

    const data=JSON.parse(rawText);
    let txt=data.content.filter(b=>b.type==="text").map(b=>b.text).join("").replace(/```json\s*/gi,"").replace(/```\s*/gi,"").trim();
    const j0=txt.indexOf("{"),j1=txt.lastIndexOf("}");
    if(j0<0||j1<0)throw new Error("Réponse inattendue du modèle");
    const p=JSON.parse(txt.slice(j0,j1+1));
    S.offers=(p.offers||[]).map((o,i)=>({...o,_id:`${Date.now()}-${i}`}));
    S.lastSearch={
      date:new Date().toLocaleString("fr-FR"),
      filters:{...f,contractTypes:[...f.contractTypes],keywords:[...f.keywords]},
      info:p.searchInfo||""
    };
    S.log=`${S.offers.length} offre${S.offers.length>1?"s":""} trouvée${S.offers.length>1?"s":""}`;
  }catch(err){
    S.error=err.message;
    S.log="";
  }
  S.loading=false;
  render();
}

// ─────────────────────────────────────────
// EXPORT
// ─────────────────────────────────────────
function doExport(){
  const X=window.XLSX;if(!X){alert("SheetJS non chargé.");return}
  const cols=[{l:"Intitulé du poste",k:"title"},{l:"Entreprise",k:"company"},{l:"Localisation",k:"location"},{l:"Salaire",k:"salary"},{l:"Contrat",k:"contractType"},{l:"Source",k:"source"},{l:"Date",k:"datePosted"},{l:"URL",k:"url"},{l:"Description",k:"description"}];
  const wb=X.utils.book_new();
  function mkSheet(list,name){
    if(!list.length)return;
    const rows=[cols.map(c=>c.l),...list.map(o=>cols.map(c=>o[c.k]||""))];
    const ws=X.utils.aoa_to_sheet(rows);
    ws["!cols"]=[{wch:35},{wch:25},{wch:20},{wch:18},{wch:12},{wch:20},{wch:14},{wch:45},{wch:60}];
    ws["!autofilter"]={ref:`A1:I${list.length+1}`};
    list.forEach((o,ri)=>{const c=X.utils.encode_cell({r:ri+1,c:7});if(ws[c]&&o.url&&o.url!=="#")ws[c].l={Target:o.url}});
    X.utils.book_append_sheet(wb,ws,name);
  }
  mkSheet(S.offers,"Toutes les offres");mkSheet(S.saved,"Favoris");
  const now=new Date();
  const ws2=X.utils.aoa_to_sheet([["TransitJobs — Export"],[""],["Date",now.toLocaleString("fr-FR")],["Localisation",`${S.filters.location} (${S.filters.radius} km)`],["Salaire min",`${Number(S.filters.minSalary).toLocaleString("fr-FR")} EUR/an brut`],["Contrats",S.filters.contractTypes.join(", ")],["Mots-clés",S.filters.keywords.join(", ")],[""],["Offres trouvées",S.offers.length],["Favoris",S.saved.length]]);
  ws2["!cols"]=[{wch:20},{wch:55}];
  X.utils.book_append_sheet(wb,ws2,"Résumé");
  X.writeFile(wb,`transitjobs_${now.toISOString().slice(0,10)}.xlsx`);
}

window.addEventListener("appinstalled",()=>{S.showInstall=false;S.deferredPrompt=null});

initSetup();
